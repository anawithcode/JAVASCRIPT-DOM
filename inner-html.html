<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner HTML</title>
</head>
<body>
    <p id="inpo">TEXT CONTENT. INNER TEXT, INNER HTML</p>
    <div id="content"></div>
<script>
    const content = document.getElementById("content");
    content.innerHTML = "<h1>Kocak</h1> <p>Kocak</p>"

</script>
</body>
</html>
