<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
</head>
<a href="https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_Selectors">PELAJARI DISINI TENTANG CSS SELECTOR</a>
<body>
    <div class="shiva"></div>
    <div class="andriyana"></div>
    <div class="ana"></div>
<script>
/*
Attribute Selector
- Attribute Selector merupakan selector yang bisa digunakan
  untuk menyeleksi element berdasarkan attribute-nya
- Kita bisa menggunakan selector [attribute]
- Atau bisa juga untuk tag tertentu,
  misalnya menggunakan selector div[attribute]
- https://developer.mozilla.org/en-US/docs/Web/CSS/Attribute_selectors
*/

    const elements = document.querySelectorAll("[class]");
    console.info(elements);
</script>
</body>
</html>
