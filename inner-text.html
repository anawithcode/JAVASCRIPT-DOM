<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Text</title>
</head>
<body>
<p id="content">
    <script>
        console.info("Hello World");
    </script>
    <b>Ana</b> Shiva <i>Andriyana</i>
</p>
<script>
    const content = document.getElementById("content");
    console.info(content.textContent);
    console.info(content.innerText);
/*
Text Content dan Inner Text
- Selain textContent, terdapat property lain bernama innerText
  untuk mendapatkan isi text sebuah element
- Tujuannya sama, yaitu mengambil atau mengubah isi text konten sebuah element,
  namun ada perbedaannya
- textContent akan mengembalikan semua isi dari konten text sebuah element
- innerText bisa tahu bagian text mana yang ditampilkan,
  dan dia hanya akan mengambil text yang ditampilkan saja
*/

    console.info(content.innerHTML);
/*
Inner HTML
- Jika Text Content dan Inner Text hanya mengambil text saja,
  Inner HTML akan mengambil seluruh element HTML-nya sebagai text
- Inner HTML juga cocok jika kita ingin mengubah isi dari element
  menggunakan text yang berisi tag HTML
*/

/*
Mengubah Element dengan Inner HTML
- Salah satu kemampuan dari innerHTML adalah,
  kita bisa mengubah isi dari children sebuah element hanya dengan string
- Tag yang terdapat di dalam String secara otomatis akan menjadi child element
*/

</script>
</body>
</html>
