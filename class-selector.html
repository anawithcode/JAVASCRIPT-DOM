<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class selector</title>
</head>
<body>
<ul>
    <li class="menuItem">1</li>
    <li>2</li>
    <li class="menuItem">3</li>
</ul>
<script>
/*
Class Selector
- Class Selector merupakan selector untuk menyeleksi semua element
  yang memiliki class sesuai dengan selector
- Untuk menggunakannya, kita bisa sebutkan nama class-nya diawali dengan titik
- https://developer.mozilla.org/en-US/docs/Web/CSS/Class_selectors
*/
    const elements = document.querySelectorAll(".menuItem"); // kalo mau lebih spesifik bisa tag dan class nya misalnya li.menuItem 
    console.info(elements);
</script>  
</body>
</html>
