<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window</title>
</head>
<body>
    <p id="content"></p>
    <p id="lokasi"></p>
<script>
/*
Window
- Window merupakan representasi window yang berisikan DOM Document
- Beberapa JavaScript function sebenarnya berasal dari object Window,
  seperti alert(), confirm(), dan prompt()
- Ada banyak sekali property, method, dan event yang bisa kita gunakan pada window
- Untuk menggunakan Window, kita tidak perlu membuat object-nya,
  cukup gunakan kata kunci window
- https://developer.mozilla.org/en-US/docs/Web/API/Window
*/
    const lokasi = document.getElementById("lokasi");
    const content = document.getElementById("content");

    const height = window.screen.height;
    const width = window.screen.width;
    const url = window.location;

    content.textContent = `Window width (${width}) x height (${height})`
    lokasi.textContent = url;
</script>
</body>
</html>
