<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
</head>
<ul>
    <li class="menuItem">1</li>
    <li id="menu2">2</li>
    <li class="menuItem">3</li>
</ul>
<body>
<script>
/*
ID Selector
- ID Selector merupakan selector yang digunakan untuk menyeleksi id
  yang sesuai dengan selector
- Untuk menggunakannya, kita bisa gunakan nama id diawali dengan karakter #
- https://developer.mozilla.org/en-US/docs/Web/CSS/ID_selectors
*/

    const elements = document.querySelectorAll("#menu2");
    console.info(elements);
</script>  
</body>
</html>
