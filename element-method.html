<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Method</title>
</head>
<body>
    <div id="content" class="content">
    <h1 id="title" class="title">This is Title</h1>
    <p id="description" class="description">This is Descroption</p>
</div>
<script>
/*
    Element Method
    - Element memiliki banyak sekali method
    - Dan karena Element adalah turunan dari Node,
    semua method Node pun bisa digunakan di Element
    - https://developer.mozilla.org/en-US/docs/Web/API/Element#methods
*/

    const description = document.getElementById("description");
    const title = document.getElementById("title");

    description.remove();  // remove ini method
    title.remove();

</script>
</body>
</html>
