<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element</title>
</head>
<body>
<h1 id="title"></h1>  
<p id="description"></p>

<script>

    /*
    Element
    - Element adalah Node yang berbentuk element, biasanya berupa HTML element
    seperti <html>, <head>, <body>, <div>, <table>, dan lain-lain
    - https://developer.mozilla.org/en-US/docs/Web/API/Element
    */

    const title = document.getElementById("title");
    title.textContent = "Belajar JavaScript DOM";

    const description = document.getElementById("description");
    description.textContent = "Harga yang harus dibayar";
</script>
</body>
</html>
