<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element property</title>
</head>
<body>
<div id="content" class="content">
    <h1 id="title" class="title">This is Title</h1>
    <p id="description" class="description">This is Descroption</p>
</div>
<script>
/*
    Element Property
    - Element memiliki banyak sekali property
    - Dan karena Element adalah turunan dari Node,
    semua property Node pun bisa digunakan di Element
    - https://developer.mozilla.org/en-US/docs/Web/API/Element#properties
*/

    const content = document.getElementById("content");

    console.info(content.id);
    console.info(content.className);
    console.info(content.tagName);
</script>
</body>
</html>
